[pytest]
testpaths = tests
addopts = --strict-markers -p no:cacheprovider
norecursedirs = .git .venv __pycache__ .pytest-tmp artifacts
markers =
    unit: fast, focused tests for pure helpers and small object behavior
    integration: multi-module flows such as IO, solve services, and compatibility wrappers
    regression: puzzle-based checks that lock in previously validated behavior
    cli: command-line entrypoint coverage
    slow: longer-running puzzle solves that are useful but optional during tight loops
